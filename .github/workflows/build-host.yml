name: Build Water Watch Pro Host BIN

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Rename firmware
        run: |
          mkdir -p output
          cp .pio/build/esp32s3/firmware.bin output/WaterWatchPro_HOST_firmware.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaterWatchPro-Host-Firmware
          path: output/WaterWatchPro_HOST_firmware.bin
