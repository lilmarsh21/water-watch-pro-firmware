[platformio]
default_envs = waterwatch_host_18

[env:waterwatch_host_18]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = partitions_16mb_ota.csv
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_PSRAM
  -DCORE_DEBUG_LEVEL=0

lib_deps =
  moononournation/GFX Library for Arduino
  adafruit/Adafruit MAX31865 library
  adafruit/Adafruit XCA9554
  lewisxhe/XPowersLib

lib_ldf_mode = deep
